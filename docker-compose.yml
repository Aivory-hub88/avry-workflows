version: '3.8'

services:
  avry_workflows:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avry-workflows
    ports:
      - "8087:8087"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8087
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - N8N_AS_CODE_URL=${N8N_AS_CODE_URL:-http://avry-n8n-as-code:3500}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aivory-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.avry-workflows.rule=Host(`backend.aivory.id`) && PathPrefix(`/workflows`)"
      - "traefik.http.routers.avry-workflows.entrypoints=websecure"
      - "traefik.http.routers.avry-workflows.tls.certresolver=letsencrypt"
      - "traefik.http.services.avry-workflows.loadbalancer.server.port=8087"

networks:
  aivory-network:
    name: aivory-network
    external: true
