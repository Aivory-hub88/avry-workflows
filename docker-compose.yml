version: '3.8'

services:
  avry_workflows:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avry-workflows
    ports:
      - "8082:8082"
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL}
      
      # Service
      PORT: 8082
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # API Keys (as needed)
      # API_KEY: ${API_KEY}
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
